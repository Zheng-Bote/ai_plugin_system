name: Dependency Scan (depdiscover)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Project
        # Ensure compile_commands.json and libs.txt are generated
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build .

      - name: Run depdiscover Action
        uses: Zheng-Bote/depdiscover@v1.3.1
        with:
          project-name: "AI plugin-system"
          compile-commands: "build/compile_commands.json"
          libs: "build/libs.txt"
          cmake: "CMakeLists.txt"
          fail-on-cvss: 7.0

      - name: Upload SBOM and Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: depdiscover-reports
          path: data/
